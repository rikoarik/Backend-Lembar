  policy:
    continuous_execution: true
    automatic_resume: true
    automatic_checkpoint: true
    max_in_progress_per_repository: 5
    max_concurrent_workers: 5
    max_correction_cycles_per_task: 2
    max_context_documents_per_task: 3
    native_mobile_boundary: out_of_scope
    production_actions_default: forbidden
  safety:
    never_push_to_main: true
    never_force_push: true
    never_access_production_secrets: true
    never_create_paid_resources: true
    use_local_adapters_when_credentials_absent: true
  stop_conditions:
    - all backend Web V1 responsibilities implemented and verified
    - genuine owner decision required (changes product behavior or architecture)
    - irreconcilable cross-repo contract conflict after 2 correction cycles
    - destructive or production action requiring explicit owner authorization
  notes: "Persist here so resume after restart finds the directive without re-reading the conversation. Owner also authorizes the orchestrator to satisfy internal worker start gates by sending exact START <TASK-ID> commands for eligible tasks without another owner message."

start_authorization:
  status: active
  command: START <TASK-ID>
  rules:
    auto_send_for_eligible_tasks: true
    require_task_exists: true
    require_dependencies_satisfied: true
    require_not_active_completed_or_duplicated: true
    require_no_branch_or_module_conflict: true
    require_complete_web_v1_eligibility: true
  do_not_auto_start_when:
    - dependencies_not_satisfied
    - active_file_or_module_overlap
    - material_product_or_architecture_decision_required
    - destructive_or_production_action_required
    - paid_resource_or_production_secret_required_without_local_alternative
    - correction_cycles_exhausted
  notes: "Internal execution gate only; orchestrator may send START on the owner's behalf."

context_management:
  status: active
  policy:
    auto_compaction: authorized_and_enabled
    explicit_compact_invocation_allowed_only_when_runtime_supports: true
    forbid_compact_via_shell: true
    persistence_source_of_truth:
      - TASK-REGISTRY.yaml
      - accepted repository decisions
      - PRD and architecture documents
      - backend-owned OpenAPI contracts
      - git task branches
      - ao/backend-integration
      - verification evidence in the repository
      - latest remote commit history
  pre_compaction_checkpoint:
    inspect_all_active_workers: true
    update_registry_with_active_completed_blocked: true
    record_per_task_branch_and_latest_pushed_commit: true
    record_completed_remaining_scope_changed_files: true
    record_verification_done_and_still_required: true
    record_next_action: true
    commit_and_push_meaningful_progress: true
  post_compaction_rehydration:
    read_registry_first: true
    read_only_max_relevant_documents: true
    inspect_git_status_and_fetch: true
    inspect_integration_and_active_branches: true
    reconstruct_state_and_resume: true
  notes: "Conversation history is not authoritative; the registry and git remote state are. Re-run any check whose success is not persisted before declaring it complete."

