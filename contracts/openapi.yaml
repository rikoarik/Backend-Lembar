components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-lembar_session
  parameters:
    WorkspaceId:
      in: header
      name: X-Workspace-Id
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
    CsrfToken:
      in: header
      name: X-CSRF-Token
      required: true
      schema: { type: string }
    IfMatch:
      in: header
      name: If-Match
      required: true
      schema: { type: string }
    MarketingSlug:
      in: path
      name: slug
      required: true
      schema:
        type: string
        enum: [home, untuk-sekolah, harga]
    Cursor:
      in: query
      name: cursor
      required: false
      schema: { type: string }
    Limit:
      in: query
      name: limit
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    AssessmentId:
      in: path
      name: assessmentId
      required: true
      schema: { type: string }
    SourceId:
      in: path
      name: sourceId
      required: true
      schema: { type: string }
    JobId:
      in: path
      name: jobId
      required: true
      schema: { type: string }
    ResourceId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    WriteBearer:
      in: header
      name: Authorization
      required: true
      schema: { type: string, minLength: 7, maxLength: 256 }
    IfNoneMatch:
      in: header
      name: If-None-Match
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Authenticated actor lacks the required platform role
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found or not visible
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Version, state, or idempotency conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version, uptimeSeconds, timestamp]
      properties:
        status: { type: string, const: ok }
        service: { type: string, const: lembar-api }
        version: { type: string }
        uptimeSeconds: { type: integer, minimum: 0 }
        timestamp: { type: string, format: date-time }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId, retryable]
          properties:
            code:
              type: string
              enum:
                - AUTH_REQUIRED
                - PERMISSION_DENIED
                - VALIDATION_FAILED
                - RESOURCE_NOT_FOUND
                - STATE_CONFLICT
                - INTERNAL_ERROR
                - WORKSPACE_ACCESS_DENIED
                - RATE_LIMITED
            message: { type: string }
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }
            requestId: { type: string }
            retryable: { type: boolean }
    WorkspaceSummary:
      type: object
      required: [id, type, name, role]
      properties:
        id: { type: string }
        type: { type: string, enum: [personal, school] }
        name: { type: string }
        role: { type: string, enum: [teacher, school_admin, subscriber, superadmin] }
        permissions:
          type: array
          items:
            type: string
            enum:
              - assessment.create
              - assessment.read
              - assessment.review
              - assessment.finalize
              - source.manage
              - library.manage
              - workspace.member.manage
              - workspace.usage.read
              - platform.support.act
        isActive: { type: boolean }
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [account, workspaces]
          properties:
            account:
              type: object
              required: [id, displayName]
              properties:
                id: { type: string }
                displayName: { type: string }
            activeWorkspaceId: { type: string }
            activeWorkspace: { $ref: "#/components/schemas/WorkspaceSummary" }
            context:
              type: object
              required: [workspaceIds, permissionSet]
              properties:
                workspaceIds:
                  type: array
                  items: { type: string }
                permissionSet:
                  type: array
                  items:
                    type: string
            workspaces:
              type: array
              items: { $ref: "#/components/schemas/WorkspaceSummary" }
    DashboardSummaryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [workspace, metrics, emptyState]
          properties:
            workspace: { $ref: "#/components/schemas/WorkspaceSummary" }
            metrics:
              type: object
              required: [assessments, sources, jobs]
              properties:
                assessments:
                  type: object
                  required: [total, draft, inReview, final]
                  properties:
                    total: { type: integer, minimum: 0 }
                    draft: { type: integer, minimum: 0 }
                    inReview: { type: integer, minimum: 0 }
                    final: { type: integer, minimum: 0 }
                sources:
                  type: object
                  required: [total, ready, processing, failed]
                  properties:
                    total: { type: integer, minimum: 0 }
                    ready: { type: integer, minimum: 0 }
                    processing: { type: integer, minimum: 0 }
                    failed: { type: integer, minimum: 0 }
                jobs:
                  type: object
                  required: [total, active, failed]
                  properties:
                    total: { type: integer, minimum: 0 }
                    active: { type: integer, minimum: 0 }
                    failed: { type: integer, minimum: 0 }
            emptyState:
              type: object
              required: [isEmpty, message]
              properties:
                isEmpty: { type: boolean }
                message: { type: string }
    CatalogOption:
      type: object
      required: [id, label, status]
      properties:
        id: { type: string }
        label: { type: string }
        status: { type: string, enum: [active, archived, unavailable] }
    UploadIntentResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [sourceId, uploadUrl, expiresAt]
          properties:
            sourceId: { type: string }
            uploadUrl: { type: string, format: uri }
            expiresAt: { type: string, format: date-time }
    SourceResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, type, status, fileName]
          properties:
            id: { type: string }
            type: { type: string, enum: [catalog, pdf] }
            status:
              {
                type: string,
                enum: [uploading, processing, ready, failed, deleted],
              }
            fileName: { type: string }
            pageCount: { type: [integer, "null"] }
            failureCode: { type: [string, "null"] }
    CreateAssessmentRequest:
      type: object
      required:
        - sourceMode
        - gradeId
        - curriculumVersionId
        - subjectId
        - materialIds
        - assessmentType
        - difficulty
        - questionCount
        - reviewMode
      properties:
        sourceMode:
          { type: string, enum: [catalog, own_pdf, catalog_and_own_pdf] }
        sourceIds:
          type: array
          items: { type: string }
        gradeId: { type: string }
        curriculumVersionId: { type: string }
        subjectId: { type: string }
        materialIds:
          type: array
          minItems: 1
          items: { type: string }
        assessmentType:
          { type: string, enum: [practice, daily, midterm, final, tka] }
        difficulty: { type: string, enum: [easy, medium, hard, mixed] }
        questionCount: { type: integer, minimum: 5, maximum: 50, default: 20 }
        reviewMode: { type: string, enum: [quick, detail] }
        teacherFocus: { type: string, maxLength: 500 }
        exampleQuestion: { type: string, maxLength: 3000 }
    AssessmentSummary:
      type: object
      required: [id, title, status, gradeLabel, subjectLabel, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        status:
          { type: string, enum: [draft, generating, review, final, archived] }
        gradeLabel: { type: string }
        subjectLabel: { type: string }
        updatedAt: { type: string, format: date-time }
    AssessmentPage:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AssessmentSummary" }
        page:
          type: object
          required: [hasMore]
          properties:
            nextCursor: { type: [string, "null"] }
            hasMore: { type: boolean }
    AssessmentResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/AssessmentSummary"
            - type: object
              required: [questionCount, reviewedCount]
              properties:
                questionCount: { type: integer }
                reviewedCount: { type: integer }
                currentVersion: { type: integer }
    JobStatus:
      type: string
      enum:
        - queued
        - preparing
        - generating
        - validating
        - rendering
        - completed
        - partially_failed
        - failed
        - cancelled
    JobResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, kind, status, stage, createdAt, updatedAt]
          properties:
            id: { type: string }
            kind:
              {
                type: string,
                enum: [source_ingestion, assessment_generation, export],
              }
            status: { $ref: "#/components/schemas/JobStatus" }
            stage: { type: string }
            progressCurrent: { type: [integer, "null"] }
            progressTotal: { type: [integer, "null"] }
            failureCode: { type: [string, "null"] }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    MarketingCta:
      type: object
      additionalProperties: false
      required: [id, label, href, variant, placement, audience, trackingKey, enabled]
      properties:
        id: { type: string, minLength: 1, maxLength: 80 }
        label: { type: string, minLength: 1, maxLength: 120 }
        href: { type: string, minLength: 1, maxLength: 500 }
        variant: { type: string, enum: [primary, secondary, text] }
        placement: { type: string, minLength: 1, maxLength: 80 }
        audience: { type: string, enum: [all, teacher, school] }
        trackingKey: { type: string, minLength: 1, maxLength: 100 }
        enabled: { type: boolean }
        external: { type: boolean, default: false }
        accessibleLabel: { type: [string, "null"], maxLength: 160 }
    MarketingBlockItem:
      type: object
      additionalProperties: false
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string, maxLength: 200 }
        body: { type: [string, "null"], maxLength: 2000 }
        mediaAssetId: { type: [string, "null"] }
        cta: { oneOf: [{ $ref: "#/components/schemas/MarketingCta" }, { type: "null" }] }
    MarketingBlock:
      type: object
      additionalProperties: false
      required: [id, type]
      properties:
        id: { type: string, minLength: 1, maxLength: 80 }
        type:
          type: string
          enum: [hero, product_proof, workflow, audience, trust, pricing, faq, final_cta]
        eyebrow: { type: [string, "null"], maxLength: 120 }
        heading: { type: [string, "null"], maxLength: 300 }
        body: { type: [string, "null"], maxLength: 4000 }
        theme: { type: string, enum: [light, dark, accent], default: light }
        mediaAssetId: { type: [string, "null"] }
        ctas:
          type: array
          maxItems: 4
          items: { $ref: "#/components/schemas/MarketingCta" }
        items:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/MarketingBlockItem" }
    MarketingSeo:
      type: object
      additionalProperties: false
      required: [title, description]
      properties:
        title: { type: string, minLength: 1, maxLength: 70 }
        description: { type: string, minLength: 1, maxLength: 180 }
        imageAssetId: { type: [string, "null"] }
        noIndex: { type: boolean, default: false }
    MarketingPageDocument:
      type: object
      additionalProperties: false
      required: [slug, locale, schemaVersion, version, blocks, seo]
      properties:
        slug: { type: string, enum: [home, untuk-sekolah, harga] }
        locale: { type: string, const: id-ID }
        schemaVersion: { type: integer, minimum: 1 }
        version: { type: integer, minimum: 1 }
        blocks:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: "#/components/schemas/MarketingBlock" }
        seo: { $ref: "#/components/schemas/MarketingSeo" }
    MarketingPageResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/MarketingPageDocument" }
    MarketingGlobalResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [locale, version, navigation, footer, ctas]
          properties:
            locale: { type: string, const: id-ID }
            version: { type: integer, minimum: 1 }
            navigation:
              type: array
              items: { $ref: "#/components/schemas/MarketingBlockItem" }
            footer:
              type: array
              items: { $ref: "#/components/schemas/MarketingBlockItem" }
            ctas:
              type: array
              items: { $ref: "#/components/schemas/MarketingCta" }
    MarketingPageSummary:
      type: object
      required: [slug, locale, state, revision]
      properties:
        slug: { type: string }
        locale: { type: string }
        state: { type: string, enum: [draft, published, unpublished] }
        revision: { type: integer, minimum: 0 }
        publishedVersion: { type: [integer, "null"] }
        updatedAt: { type: string, format: date-time }
    MarketingOpsPageResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [summary, draft, versions]
          properties:
            summary: { $ref: "#/components/schemas/MarketingPageSummary" }
            draft:
              oneOf:
                - $ref: "#/components/schemas/MarketingPageDocument"
                - type: "null"
            versions:
              type: array
              items: { $ref: "#/components/schemas/MarketingPageSummary" }
    SaveMarketingDraftRequest:
      type: object
      additionalProperties: false
      required: [schemaVersion, blocks, seo]
      properties:
        schemaVersion: { type: integer, minimum: 1 }
        blocks:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: "#/components/schemas/MarketingBlock" }
        seo: { $ref: "#/components/schemas/MarketingSeo" }
    CurriculumResourceResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
    CurriculumProjectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: true
    VersionListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        page:
          type: object
          required: [limit, hasMore]
          properties:
            limit: { type: integer, minimum: 1, maximum: 100 }
            hasMore: { type: boolean }
    SourceRightsGateResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean }
            reason: { type: [string, "null"] }
    CurriculumDraftRequest:
      type: object
      required: [tenantId, slug, code, title, level]
      properties:
        tenantId: { type: string, format: uuid }
        slug: { type: string, minLength: 1, maxLength: 80 }
        code: { type: string, minLength: 1, maxLength: 80 }
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, "null"], maxLength: 2000 }
        level:
          type: string
          enum: [sd, smp, sma, smk, other]
        active: { type: boolean, default: true }
    GradeDraftRequest:
      type: object
      required: [curriculumId, code, label]
      properties:
        curriculumId: { type: string, format: uuid }
        code: { type: string, minLength: 1, maxLength: 40 }
        label: { type: string, minLength: 1, maxLength: 120 }
        ordering: { type: integer, minimum: 0, maximum: 1000, default: 0 }
    PhaseDraftRequest:
      type: object
      required: [gradeId, code, label]
      properties:
        gradeId: { type: string, format: uuid }
        code: { type: string, minLength: 1, maxLength: 40 }
        label: { type: string, minLength: 1, maxLength: 120 }
        ordering: { type: integer, minimum: 0, maximum: 1000, default: 0 }
    SubjectDraftRequest:
      type: object
      required: [phaseId, code, title]
      properties:
        phaseId: { type: string, format: uuid }
        code: { type: string, minLength: 1, maxLength: 40 }
        title: { type: string, minLength: 1, maxLength: 200 }
        ordering: { type: integer, minimum: 0, maximum: 1000, default: 0 }
    OutcomeDraftRequest:
      type: object
      required: [subjectId, code, text, bloomLevel]
      properties:
        subjectId: { type: string, format: uuid }
        code: { type: string, minLength: 1, maxLength: 40 }
        text: { type: string, minLength: 1, maxLength: 1000 }
        bloomLevel:
          type: string
          enum: [remember, understand, apply, analyze, evaluate, create]
        ordering: { type: integer, minimum: 0, maximum: 1000, default: 0 }
    MaterialDraftRequest:
      type: object
      required: [outcomeId, code, kind, title, sourceRights]
      properties:
        outcomeId: { type: string, format: uuid }
        code: { type: string, minLength: 1, maxLength: 40 }
        kind:
          type: string
          enum: [lesson, exercise, reading, video, assessment, reference]
        title: { type: string, minLength: 1, maxLength: 200 }
        sourceRights:
          type: string
          enum:
            - license:internal
            - license:cc-by
            - license:cc-by-sa
            - license:cc-by-nc
            - license:cc-by-nd
            - license:unknown
        ordering: { type: integer, minimum: 0, maximum: 1000, default: 0 }
    NotificationTemplateSummary:
      type: object
      required: [templateKey, locale, version, subject]
      properties:
        templateKey: { type: string }
        locale: { type: string, enum: [id-ID, en-US] }
        version: { type: integer, minimum: 1 }
        subject: { type: string }
    NotificationTemplateVariant:
      allOf:
        - $ref: "#/components/schemas/NotificationTemplateSummary"
        - type: object
          required: [bodyText]
          properties:
            bodyText: { type: string }
    NotificationTemplateListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/NotificationTemplateSummary" }
    NotificationTemplateVariantsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/NotificationTemplateVariant" }
    NotificationRecipient:
      type: object
      required: [kind, value]
      properties:
        kind: { type: string, enum: [email, sms] }
        value: { type: string, minLength: 1, maxLength: 320 }
    NotificationDispatchRequest:
      type: object
      required: [templateKey, recipient, payload, eventId]
      properties:
        templateKey: { type: string }
        locale: { type: string, default: id-ID }
        recipient: { $ref: "#/components/schemas/NotificationRecipient" }
        payload:
          type: object
          additionalProperties: true
        eventId: { type: string, format: uuid }
        visibleAt: { type: [string, "null"], format: date-time }
    NotificationDispatchResult:
      type: object
      required: [status, outboxId, locale, redactedRecipient, subjectHash]
      properties:
        status: { type: string, enum: [dispatched, duplicate, rejected] }
        outboxId: { type: [string, "null"], format: uuid }
        locale: { type: string, enum: [id-ID, en-US] }
        redactedRecipient: { type: string }
        subjectHash: { type: string }
    NotificationDispatchResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/NotificationDispatchResult" }
    NotificationAuditRow:
      type: object
      required: [id, adapter, status, redactedRecipient, createdAt]
      properties:
        id: { type: string, format: uuid }
        outboxId: { type: [string, "null"], format: uuid }
        adapter: { type: string, enum: [memory] }
        status: { type: string, enum: [dispatched, failed] }
        redactedRecipient: { type: string }
        redactedSubjectHash: { type: [string, "null"] }
        latencyMs: { type: [integer, "null"], minimum: 0 }
        createdAt: { type: string, format: date-time }
    NotificationAuditResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/NotificationAuditRow" }
security:
  - sessionCookie: []
