openapi: 3.1.0
info:
  title: lembar API
  version: 0.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: >-
    Baseline contract for planning. The backend repository owns the executable OpenAPI
    document. This file does not authorize implementation of every path at once.
servers:
  - url: /
    description: Current API origin or configured same-origin gateway
tags:
  - name: System
    description: Health and service metadata.
  - name: Identity
    description: Current account, session, and workspace context.
  - name: Catalog
    description: Versioned curriculum, grade, subject, and material options.
  - name: Sources
    description: Private source upload and processing lifecycle.
  - name: Assessments
    description: Assessment drafts, versions, review, and finalization.
  - name: Jobs
    description: Neutral asynchronous job state.
  - name: Outputs
    description: Export artifacts and controlled sharing.
  - name: Marketing
    description: Published structured marketing content.
  - name: MarketingOps
    description: Superadmin-only marketing authoring and publication.
  - name: Notifications
    description: Transactional notification templates, dispatch, and redacted audit log.
paths:
  /health:
    get:
      summary: Read service health
      tags: [System]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /v1/me:
    get:
      summary: Read the current account and workspace options
      tags: [Identity]
      operationId: getCurrentAccount
      responses:
        "200":
          description: Current account and available workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/dashboard/summary:
    get:
      summary: Read the active workspace dashboard summary
      tags: [Identity]
      operationId: getDashboardSummary
      responses:
        "200":
          description: Active workspace dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/catalog/grades:
    get:
      summary: List available grades
      tags: [Catalog]
      operationId: listGrades
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Available grades
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CatalogOption"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/catalog/subjects:
    get:
      summary: List subjects for a grade and curriculum version
      tags: [Catalog]
      operationId: listSubjects
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - in: query
          name: gradeId
          required: true
          schema: { type: string }
        - in: query
          name: curriculumVersionId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Available subjects
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CatalogOption"
        "400":
          $ref: "#/components/responses/ValidationError"
  /v1/catalog/materials:
    get:
      summary: List materials for the selected catalog context
      tags: [Catalog]
      operationId: listMaterials
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - in: query
          name: gradeId
          required: true
          schema: { type: string }
        - in: query
          name: subjectId
          required: true
          schema: { type: string }
        - in: query
          name: curriculumVersionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Available materials
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CatalogOption"
        "400":
          $ref: "#/components/responses/ValidationError"
  /v1/sources/upload-intents:
    post:
      summary: Create a private PDF upload intent
      tags: [Sources]
      operationId: createSourceUploadIntent
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType, sizeBytes]
              properties:
                fileName: { type: string, maxLength: 200 }
                contentType: { type: string, const: application/pdf }
                sizeBytes: { type: integer, minimum: 1 }
      responses:
        "201":
          description: Upload intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadIntentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
  /v1/sources/{sourceId}:
    get:
      summary: Read source processing state
      tags: [Sources]
      operationId: getSource
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Source state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/assessments:
    get:
      summary: List assessments in the active workspace
      tags: [Assessments]
      operationId: listAssessments
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Assessment page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create an assessment draft and generation job
      tags: [Assessments]
      operationId: createAssessment
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssessmentRequest"
      responses:
        "201":
          description: Draft and generation job created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [assessmentId, jobId, status]
                    properties:
                      assessmentId: { type: string }
                      jobId: { type: string }
                      status: { $ref: "#/components/schemas/JobStatus" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/assessments/{assessmentId}:
    get:
      summary: Read an assessment
      tags: [Assessments]
      operationId: getAssessment
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/AssessmentId"
      responses:
        "200":
          description: Assessment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/assessments/{assessmentId}/finalize:
    post:
      summary: Finalize the reviewed assessment version
      tags: [Assessments]
      operationId: finalizeAssessment
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/AssessmentId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Final version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResponse"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/assessments/{assessmentId}/exports:
    post:
      summary: Create an export job for a final assessment
      tags: [Outputs]
      operationId: createAssessmentExport
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/AssessmentId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format: { type: string, enum: [pdf] }
                includeAnswerKey: { type: boolean, default: true }
                includeExplanation: { type: boolean, default: false }
      responses:
        "202":
          description: Export job accepted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [jobId, status]
                    properties:
                      jobId: { type: string }
                      status: { $ref: "#/components/schemas/JobStatus" }
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/jobs/{jobId}:
    get:
      summary: Read asynchronous job state
      tags: [Jobs]
      operationId: getJob
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/public/marketing/global:
    get:
      summary: Read published global marketing content
      tags: [Marketing]
      operationId: getPublishedMarketingGlobal
      security: []
      parameters:
        - in: query
          name: locale
          schema: { type: string, default: id-ID }
      responses:
        "200":
          description: Published navigation, footer, CTA, and default SEO
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingGlobalResponse"
        "304":
          description: Cached representation is current
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/public/marketing/pages/{slug}:
    get:
      summary: Read a published marketing page
      tags: [Marketing]
      operationId: getPublishedMarketingPage
      security: []
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
        - in: query
          name: locale
          schema: { type: string, default: id-ID }
      responses:
        "200":
          description: Published structured page
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingPageResponse"
        "304":
          description: Cached representation is current
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/ops/marketing/pages:
    get:
      summary: List marketing pages and authoring state
      tags: [MarketingOps]
      operationId: listMarketingPagesForOps
      responses:
        "200":
          description: Page and version summaries
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/MarketingPageSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /v1/ops/marketing/pages/{slug}:
    get:
      summary: Read marketing page authoring state
      tags: [MarketingOps]
      operationId: getMarketingPageForOps
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
      responses:
        "200":
          description: Current draft, published version, and version summaries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingOpsPageResponse" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/ops/marketing/pages/{slug}/draft:
    put:
      summary: Save a structured marketing page draft
      tags: [MarketingOps]
      operationId: saveMarketingPageDraft
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveMarketingDraftRequest" }
      responses:
        "200":
          description: Draft saved with a new revision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingOpsPageResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/ops/marketing/pages/{slug}/preview:
    get:
      summary: Read authenticated no-store draft preview
      tags: [MarketingOps]
      operationId: previewMarketingPageDraft
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
      responses:
        "200":
          description: Draft projection for the shared frontend renderer
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingPageResponse" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/ops/marketing/pages/{slug}/publish:
    post:
      summary: Publish the current validated draft
      tags: [MarketingOps]
      operationId: publishMarketingPageDraft
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Immutable version published
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingOpsPageResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/ops/marketing/pages/{slug}/unpublish:
    post:
      summary: Remove the current page from public delivery
      tags: [MarketingOps]
      operationId: unpublishMarketingPage
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Public pointer cleared with audit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingOpsPageResponse" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/ops/marketing/pages/{slug}/versions/{version}/restore:
    post:
      summary: Copy a historical version into a new draft
      tags: [MarketingOps]
      operationId: restoreMarketingPageVersion
      parameters:
        - $ref: "#/components/parameters/MarketingSlug"
        - in: path
          name: version
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "201":
          description: New draft created from the selected version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingOpsPageResponse" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/curricula/{tenantSlug}:
    get:
      summary: Read the published curriculum catalog for a tenant
      tags: [Curriculum]
      operationId: getPublishedCurriculumByTenantSlug
      security: []
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema: { type: string, minLength: 1, maxLength: 80 }
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: Published curriculum tree (grades, phases, subjects, outcomes, materials)
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumProjectionResponse" }
        "304":
          description: Cached representation is current
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/curricula:
    post:
      summary: Create a mutable curriculum draft for a tenant
      tags: [Curriculum]
      operationId: createCurriculumDraft
      parameters:
        - $ref: "#/components/parameters/WriteBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CurriculumDraftRequest" }
      responses:
        "201":
          description: Mutable draft created
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/curriculum/curricula/{id}/draft:
    put:
      summary: Upsert the mutable draft for a curriculum
      tags: [Curriculum]
      operationId: upsertCurriculumDraft
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/WriteBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CurriculumDraftRequest" }
      responses:
        "200":
          description: Draft updated
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/curricula/{id}/publish:
    post:
      summary: Snapshot the current draft into a new immutable version
      tags: [Curriculum]
      operationId: publishCurriculum
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/WriteBearer"
      responses:
        "200":
          description: New version published
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/curriculum/curricula/{id}/versions:
    get:
      summary: List published versions for a curriculum
      tags: [Curriculum]
      operationId: listCurriculumVersions
      security: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated publish history (capped at 100)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionListResponse" }
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/curricula/{id}/versions/{version}:
    get:
      summary: Read a specific immutable curriculum version
      tags: [Curriculum]
      operationId: getCurriculumVersion
      security: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - in: path
          name: version
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: Immutable version payload
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "304":
          description: Cached representation is current
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/grades:
    post:
      summary: Create a mutable grade draft under a curriculum
      tags: [Curriculum]
      operationId: createGradeDraft
      parameters:
        - $ref: "#/components/parameters/WriteBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GradeDraftRequest" }
      responses:
        "201":
          description: Draft created
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/curriculum/grades/{id}/draft:
    put:
      summary: Upsert a mutable grade draft
      tags: [Curriculum]
      operationId: upsertGradeDraft
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/WriteBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GradeDraftRequest" }
      responses:
        "200":
          description: Draft updated
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/grades/{id}/publish:
    post:
      summary: Snapshot a grade draft into a new immutable version
      tags: [Curriculum]
      operationId: publishGrade
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/WriteBearer"
      responses:
        "200":
          description: New version published
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/curriculum/grades/{id}/versions:
    get:
      summary: List published versions for a grade
      tags: [Curriculum]
      operationId: listGradeVersions
      security: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated grade publish history
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionListResponse" }
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/grades/{id}/versions/{version}:
    get:
      summary: Read a specific immutable grade version
      tags: [Curriculum]
      operationId: getGradeVersion
      security: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - in: path
          name: version
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: Immutable grade version
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "304":
          description: Cached representation is current
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/curriculum/phases:
    post:
      summary: Create a mutable phase draft under a grade
      tags: [Curriculum]
      operationId: createPhaseDraft
      parameters:
        - $ref: "#/components/parameters/WriteBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PhaseDraftRequest" }
      responses:
        "201":
          description: Draft created
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurriculumResourceResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/curriculum/phases/{id}/draft:
    put:
      summary: Upsert a mutable phase draft
      tags: [Curriculum]
      operationId: upsertPhaseDraft
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/WriteBearer"
      requestBody:
        required: true
